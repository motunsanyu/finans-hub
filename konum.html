<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hibrit Konum - GPS veya IP + Adres</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; }
        .konteyner { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1000px; width: 100%; }
        .konum-kutusu { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex: 1; min-width: 300px; }
        .harita-alani { flex: 2; min-width: 300px; height: 450px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; background: #e0e0e0; }
        iframe { width: 100%; height: 100%; border: none; }
        h2 { margin-top: 0; color: #333; }
        p { margin: 12px 0; color: #555; border-bottom: 1px solid #eee; padding-bottom: 6px; }
        .vurgu { font-weight: bold; color: #007BFF; }
        #durum { font-weight: bold; margin-bottom: 10px; }
        .tarih { color: #888; font-size: 13px; margin-top: 5px; border-bottom: none; }
    </style>
</head>
<body>

<h1 style="margin-bottom: 30px; color: #333;">Akıllı Konum Sistemi (GPS + IP)</h1>

<div class="konteyner">
    <div class="konum-kutusu">
        <h2>Sistem Durumu</h2>
        <div id="durum">Konum belirleniyor...</div>
        <div id="sonuc">
            <p><strong>Yöntem:</strong> <span id="yontem" class="vurgu">-</span></p>
            <p><strong>Enlem (Lat):</strong> <span id="enlem">-</span></p>
            <p><strong>Boylam (Lng):</strong> <span id="boylam">-</span></p>
            <p><strong>Adres:</strong> <span id="adres" class="vurgu">-</span></p>
        </div>
        <p id="tarih" class="tarih"></p>
    </div>

    <div class="harita-alani" id="haritaKutusu">
        <div style="display:flex; align-items:center; justify-content:center; height:100%; color:#888;">
            Harita yükleniyor...
        </div>
    </div>
</div>

<script>
    // Tarihi göster (örnek: 29.05.2026 - Cuma)
    function tarihGuncelle() {
        const simdi = new Date();
        const gun = simdi.getDate().toString().padStart(2, '0');
        const ay = (simdi.getMonth() + 1).toString().padStart(2, '0');
        const yil = simdi.getFullYear();
        const gunAdi = simdi.toLocaleDateString('tr-TR', { weekday: 'long' });
        // İlk harfi büyük yapalım
        const gunAdiDuzenli = gunAdi.charAt(0).toUpperCase() + gunAdi.slice(1);
        document.getElementById('tarih').textContent = `📅 Tarih: ${gun}.${ay}.${yil} – ${gunAdiDuzenli}`;
    }

    // Google Harita güncelleyici
    function haritayiGuncelle(lat, lng, zoom = 16) {
        const url = `https://maps.google.com/maps?q=${lat},${lng}&z=${zoom}&output=embed`;
        document.getElementById('haritaKutusu').innerHTML = 
            `<iframe src="${url}" allowfullscreen="" loading="lazy"></iframe>`;
    }

    // Arayüz güncelleyici (enlem, boylam, yöntem)
    function arayuzGuncelle(yontem, lat, lng, durumMetni) {
        document.getElementById('durum').textContent = durumMetni;
        document.getElementById('durum').style.color = yontem === 'GPS' ? '#28a745' : '#f0ad4e';
        document.getElementById('yontem').textContent = yontem;
        document.getElementById('enlem').textContent = lat.toFixed(6);
        document.getElementById('boylam').textContent = lng.toFixed(6);
    }

    // Adresi güncelleyici (ters geokodlama)
    async function adresGuncelle(lat, lng) {
        const adresSpan = document.getElementById('adres');
        adresSpan.textContent = 'Adres sorgulanıyor...';
        try {
            const response = await fetch(
                `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&addressdetails=1&accept-language=tr`,
                {
                    headers: {
                        'User-Agent': 'KonumUygulamasi/1.0 (ornek@email.com)' // Kendi bilgilerinizle değiştirin
                    }
                }
            );
            if (!response.ok) throw new Error('Servis yanıt vermedi');
            const data = await response.json();
            if (data && data.address) {
                const addr = data.address;
                // Örnek: "Atabey Sk., Çankaya / Ankara"
                let adresMetni = '';
                if (addr.road) adresMetni += addr.road;
                else if (addr.pedestrian) adresMetni += addr.pedestrian;
                if (addr.suburb) adresMetni += (adresMetni ? ', ' : '') + addr.suburb;
                if (addr.city || addr.town || addr.village) {
                    const sehir = addr.city || addr.town || addr.village;
                    adresMetni += (adresMetni ? ' / ' : '') + sehir;
                }
                if (!adresMetni) {
                    // Yedek: tam display_name
                    adresMetni = data.display_name;
                }
                adresSpan.textContent = adresMetni || 'Adres detayı alınamadı';
            } else {
                adresSpan.textContent = 'Adres bulunamadı';
            }
        } catch (e) {
            console.warn('Adres alınamadı:', e);
            adresSpan.textContent = 'Adres alınamadı';
        }
    }

    // IP Geolocation API'lerini dene
    async function ipKonumuAl() {
        const servisler = [
            {
                isim: 'ipapi.co',
                url: 'https://ipapi.co/json/',
                isle: (data) => ({ lat: data.latitude, lon: data.longitude, source: 'ipapi.co' })
            },
            {
                isim: 'ip-api.com',
                url: 'http://ip-api.com/json/?fields=lat,lon,status',
                isle: (data) => {
                    if (data.status !== 'success') throw new Error('Başarısız');
                    return { lat: data.lat, lon: data.lon, source: 'ip-api.com' };
                }
            },
            {
                isim: 'geolocation-db',
                url: 'https://geolocation-db.com/json/',
                isle: (data) => ({ lat: data.latitude, lon: data.longitude, source: 'geolocation-db.com' })
            }
        ];

        for (let servis of servisler) {
            try {
                const response = await fetch(servis.url);
                if (!response.ok) continue;
                const data = await response.json();
                const sonuc = servis.isle(data);
                if (sonuc.lat && sonuc.lon) {
                    return { lat: sonuc.lat, lon: sonuc.lon, source: sonuc.source };
                }
            } catch (e) {
                console.warn(`${servis.isim} çalışmadı: ${e.message}`);
            }
        }
        return null;
    }

    // Ana akış
    async function konumBelirle() {
        // Önce tarihi yazalım
        tarihGuncelle();

        // GPS dene
        if (navigator.geolocation) {
            try {
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 5000
                    });
                });

                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                haritayiGuncelle(lat, lng, 16);
                arayuzGuncelle('GPS', lat, lng, '✅ Hassas konum (GPS) alındı');
                adresGuncelle(lat, lng);
                return;
            } catch (gpsError) {
                console.warn('GPS başarısız, IP tabanlı konuma geçiliyor:', gpsError.message);
            }
        }

        // IP konumu al
        arayuzGuncelle('IP', 0, 0, '⏳ IP konumu sorgulanıyor...');
        const ipKonum = await ipKonumuAl();
        if (ipKonum) {
            haritayiGuncelle(ipKonum.lat, ipKonum.lon, 10);
            arayuzGuncelle(`IP (${ipKonum.source})`, ipKonum.lat, ipKonum.lon, '📍 IP tabanlı konum gösteriliyor');
            adresGuncelle(ipKonum.lat, ipKonum.lon);
        } else {
            // Varsayılan Ankara
            const varsayilanLat = 39.9334;
            const varsayilanLng = 32.8597;
            haritayiGuncelle(varsayilanLat, varsayilanLng, 6);
            arayuzGuncelle('Varsayılan', varsayilanLat, varsayilanLng, '⚠️ Konum alınamadı, varsayılan gösteriliyor');
            adresGuncelle(varsayilanLat, varsayilanLng);
        }
    }

    window.addEventListener('DOMContentLoaded', konumBelirle);
</script>

</body>
</html>
